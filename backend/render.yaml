services:
  - type: web
    name: dice-duel-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DEV_MODE
        value: false
      - key: BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/data/dice_duel.db
